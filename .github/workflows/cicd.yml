name: CI/CD with Docker

on:
  push:
    branches: [ cicd-test ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드를 체크아웃
      - uses: actions/checkout@v3

      # 2. Docker를 설정하고 로그인
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Docker 이미지 빌드
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/flowday:latest .

      # 4. Docker Hub에 이미지 푸시
      - name: Push Docker image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/flowday:latest

      # 5. Elastic Beanstalk 배포
      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v20
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: flowday
          environment_name: Flowday-env
          version_label: docker-${{ github.run_id }}
          region: ap-northeast-2
          deployment_package: Dockerrun.aws.json

  # `Dockerrun.aws.json` 생성 작업
  generate_dockerrun:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Dockerrun.aws.json
        run: |
          echo '{
            "AWSEBDockerrunVersion": "1",
            "Image": {
              "Name": "${{ secrets.DOCKER_USERNAME }}/flowday:latest",
              "Update": "true"
            },
            "Ports": [
              {
                "ContainerPort": "8080"
              }
            ]
          }' > Dockerrun.aws.json
